<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Leitor de PDF com Áudio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="file"] {
            padding: 10px;
        }

        button {
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }

        .texto {
            max-height: 200px;
            overflow-y: auto;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }

            button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 PDF → 🎧 Áudio</h1>

    <form method="POST" enctype="multipart/form-data" onsubmit="mostrarLoading()">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Gerar Áudio</button>
    </form>

    <div id="loading" style="display:none; text-align:center; margin-top:10px;">
        ⏳ Gerando áudio... aguarde
    </div>

    {% if audio_url %}
        <h3>🎧 Áudio gerado:</h3>
        <audio controls>
            <source src="{{ audio_url }}" type="audio/mpeg">
        </audio>

        <a href="{{ audio_url }}" download>
            ⬇️ Baixar áudio
        </a>
    {% endif %}

    {% if texto %}
        <h3>📄 Texto extraído:</h3>
        <div class="texto">
            {{ texto }}
        </div>
    {% endif %}
</div>

<script>
function mostrarLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
